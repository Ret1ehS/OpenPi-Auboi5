# Active runtime configuration for this machine.
# Loaded automatically by utils.env_utils.load_default_env().
# Override with OPENPI_CONFIG_FILE=/abs/path/to/another_config.yaml when needed.

env:
  # Python / SDK
  OPENPI_RUNTIME_PYTHON: /home/niic/openpi/miniforge3/envs/openpi-py311/bin/python
  OPENPI_PYTORCH_RUNTIME_PYTHON: /home/niic/openpi/miniforge3/envs/openpi-py310-torch/bin/python
  OPENPI_SDK_ROOT: /home/niic/openpi/aubo_sdk/aubo_sdk-0.24.1-rc.3-Linux_aarch64+318754d
  # OPENPI_ROOT: /home/niic/openpi/repo
  # OPENPI_CONDA_PYTHON: /home/niic/openpi/miniforge3/envs/openpi-py311/bin/python

  # Robot / toolchain
  OPENPI_ROBOT_IP: 192.168.1.100
  OPENPI_ROBOT_PORT: 30004
  OPENPI_ROBOT_USER: aubo
  OPENPI_ROBOT_PASSWORD: "123456"
  OPENPI_TOOL_VOLTAGE: 24

  OPENPI_GRIPPER_PORT: /dev/serial/by-id/usb-FTDI_FT232R_USB_UART_AB0LIYTU-if00-port0
  OPENPI_GRIPPER_FALLBACK_PORT: /dev/ttyUSB3
  OPENPI_FORCE_SENSOR_PORT: /dev/serial/by-id/usb-FTDI_FT232R_USB_UART_A10PHIEG-if00-port0
  OPENPI_FORCE_SENSOR_FALLBACK_PORT: /dev/ttyUSB4

  # Optional gripper tuning
  # OPENPI_OPEN: 130
  # OPENPI_CLOSE: 210
  # OPENPI_THRESHOLD: 5
  # OPENPI_MAPPING: default

  # Policy / checkpoints
  OPENPI_POLICY_CONFIG_NAME: pi05_aubo_agv_lora
  OPENPI_CHECKPOINT_DIR: /home/niic/openpi/repo/checkpoints/pi05_aubo_agv_lora/my_eighth_run/29999
  OPENPI_POLICY_BACKEND: auto
  OPENPI_SAMPLE_NUM_STEPS: 10
  # OPENPI_DELTA_DIM: 7

  # PyTorch local backend
  OPENPI_PYTORCH_CHECKPOINT_DIR: /home/niic/openpi/repo/checkpoints/pi05_aubo_agv_lora_pytorch_attnvecfix_float32/my_eighth_run/29999
  OPENPI_PYTORCH_DEVICE: cuda
  OPENPI_PYTORCH_TOKENIZER_MODEL: /home/niic/.cache/openpi/big_vision/paligemma_tokenizer.model
  OPENPI_PYTORCH_COMPILE_MODE: none
  OPENPI_PYTORCH_ATTN_BACKEND: eager
  OPENPI_PYTORCH_SHOW_OPTIONAL_WARNINGS: false

  # JAX runtime
  OPENPI_DISABLE_JAX_GPU_FIX: false
  OPENPI_JAX_PREALLOCATE: false
  # OPENPI_JAX_MEM_FRACTION: 0.50
  OPENPI_SKIP_JAX_GPU_PROBE: 1
  # OPENPI_JAX_PLATFORM: gpu

  # Main / TUI defaults
  OPENPI_DEBUG_DRY_RUN: false
  # OPENPI_IMAGE_SIZE: 224

  # Remote policy forwarding
  OPENPI_K8S_NAMESPACE: <username>
  OPENPI_POLICY_LOCAL_PORT: 8000
  OPENPI_POLICY_REMOTE_PORT: 8000
  OPENPI_KUBECONFIG: support/kubeconfig.yaml

  # Task observer
  OPENPI_TASK_OBSERVER_ENABLE: false
  OPENPI_TASK_OBSERVER_INTERVAL_S: 5.0
  OPENPI_TASK_OBSERVER_PYTHON: /home/niic/venvs/vllm-jp62-clean/bin/python
  OPENPI_TASK_OBSERVER_MODEL: /home/niic/modelscope_models/google/gemma-4-E2B-it
  OPENPI_TASK_OBSERVER_MAX_NEW_TOKENS: 96
  # OPENPI_TASK_OBSERVER_SPEC:
  OPENPI_TASK_OBSERVER_SPEC_FILE: task/prompt.txt

  # Remote keyboard relay
  OPENPI_REMOTE_KEYBOARD_TCP_PORT: 28731
  OPENPI_REMOTE_KEYBOARD_HTTP_PORT: 28732
